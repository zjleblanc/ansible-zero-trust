---
# Docs-only commits (.md): skip lint/format hooks; gitleaks still runs.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.md$'
      - id: check-yaml
        args: [--unsafe]
        exclude: '\.md$'
      - id: check-added-large-files
        exclude: '\.md$'
      - id: check-merge-conflict
        exclude: '\.md$'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        # Upstream defaults to always_run; disable so docs-only commits skip it.
        always_run: false
        exclude: '\.md$'
        additional_dependencies:
          - ansible-core>=2.19,<2.22
