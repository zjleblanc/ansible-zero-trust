---
- name: Assert Access policy entry fields
  ansible.builtin.assert:
    fail_msg: >-
      Each cloudflare_access_policies entry requires name, hostname, decision,
      and a non-empty include list.
    that:
      - cloudflare_access_policy.name is defined
      - cloudflare_access_policy.name | length > 0
      - cloudflare_access_policy.hostname is defined
      - cloudflare_access_policy.hostname | length > 0
      - cloudflare_access_policy.decision is defined
      - cloudflare_access_policy.decision | length > 0
      - cloudflare_access_policy.include is defined
      - cloudflare_access_policy.include | length > 0

- name: Find existing Access application for hostname
  no_log: "{{ cloudflare_no_log | default(true) }}"
  ansible.builtin.set_fact:
    _cloudflare_access_app: >-
      {{ (cloudflare_access_apps_list.json.result | default([]))
         | selectattr('domain', 'defined')
         | selectattr('domain', 'equalto', cloudflare_access_policy.hostname)
         | list
         | first
         | default({}, true) }}
    cacheable: false

- name: Create Access self-hosted application
  when: (_cloudflare_access_app.id | default('') | length) == 0
  no_log: "{{ cloudflare_no_log | default(true) }}"
  register: cloudflare_access_app_create
  ansible.builtin.uri:
    body:
      name: "{{ cloudflare_access_policy.name }}"
      type: self_hosted
      domain: "{{ cloudflare_access_policy.hostname }}"
      destinations:
        - type: public
          uri: "{{ cloudflare_access_policy.hostname }}"
    body_format: json
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    method: POST
    return_content: true
    status_code: [200, 201]
    url: "{{ cloudflare_api_base }}/accounts/{{ cloudflare_account_id }}/access/apps"

- name: Set Access application ID
  no_log: "{{ cloudflare_no_log | default(true) }}"
  ansible.builtin.set_fact:
    _cloudflare_access_app_id: >-
      {{ cloudflare_access_app_create.json.result.id
         if (cloudflare_access_app_create is defined and not (cloudflare_access_app_create.skipped | default(false)))
         else _cloudflare_access_app.id }}
    cacheable: false

- name: Refresh Access applications list after create
  when: cloudflare_access_app_create is defined and not (cloudflare_access_app_create.skipped | default(false))
  no_log: "{{ cloudflare_no_log | default(true) }}"
  register: cloudflare_access_apps_list
  ansible.builtin.uri:
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    method: GET
    return_content: true
    status_code: [200]
    url: "{{ cloudflare_api_base }}/accounts/{{ cloudflare_account_id }}/access/apps"

- name: List policies for Access application
  no_log: "{{ cloudflare_no_log | default(true) }}"
  register: cloudflare_access_app_policies
  ansible.builtin.uri:
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    method: GET
    return_content: true
    status_code: [200]
    url: "{{ cloudflare_api_base }}/accounts/{{ cloudflare_account_id }}/access/apps/{{ _cloudflare_access_app_id }}/policies"

- name: Find existing Access policy by name
  no_log: "{{ cloudflare_no_log | default(true) }}"
  ansible.builtin.set_fact:
    _cloudflare_access_policy_match: >-
      {{ (cloudflare_access_app_policies.json.result | default([]))
         | selectattr('name', 'defined')
         | selectattr('name', 'equalto', cloudflare_access_policy.name)
         | list
         | first
         | default({}, true) }}
    cacheable: false

- name: Build Access policy body
  no_log: "{{ cloudflare_no_log | default(true) }}"
  ansible.builtin.set_fact:
    _cloudflare_access_policy_body: >-
      {{
        {
          'name': cloudflare_access_policy.name,
          'decision': cloudflare_access_policy.decision,
          'include': cloudflare_access_policy.include,
          'require': cloudflare_access_policy.require | default([]),
          'exclude': cloudflare_access_policy.exclude | default([])
        }
        | combine(
            {'session_duration': cloudflare_access_policy.session_duration}
            if (cloudflare_access_policy.session_duration | default('') | length > 0)
            else {}
          )
        | combine(
            {'precedence': cloudflare_access_policy.precedence}
            if (cloudflare_access_policy.precedence is defined)
            else {}
          )
      }}
    cacheable: false

- name: Create Access application policy
  when: (_cloudflare_access_policy_match.id | default('') | length) == 0
  no_log: "{{ cloudflare_no_log | default(true) }}"
  ansible.builtin.uri:
    body: "{{ _cloudflare_access_policy_body }}"
    body_format: json
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    method: POST
    return_content: true
    status_code: [200, 201]
    url: "{{ cloudflare_api_base }}/accounts/{{ cloudflare_account_id }}/access/apps/{{ _cloudflare_access_app_id }}/policies"

- name: Update existing Access application policy
  when: (_cloudflare_access_policy_match.id | default('') | length) > 0
  no_log: "{{ cloudflare_no_log | default(true) }}"
  ansible.builtin.uri:
    body: "{{ _cloudflare_access_policy_body }}"
    body_format: json
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    method: PUT
    return_content: true
    status_code: [200]
    url: "{{ cloudflare_api_base }}/accounts/{{ cloudflare_account_id }}/access/apps/{{ _cloudflare_access_app_id }}/policies/{{ _cloudflare_access_policy_match.id }}"
