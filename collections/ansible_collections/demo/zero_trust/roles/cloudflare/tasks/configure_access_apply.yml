---
- name: Resolve API credentials
  ansible.builtin.include_tasks: resolve_api_token.yml

- name: Assert required Access variables
  ansible.builtin.assert:
    fail_msg: Set cloudflare_account_id (inventory or playbook vars).
    that:
      - cloudflare_account_id is defined
      - cloudflare_account_id | length > 0

- name: List existing Access applications
  no_log: "{{ cloudflare_no_log | default(true) }}"
  register: cloudflare_access_apps_list
  ansible.builtin.uri:
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    method: GET
    return_content: true
    status_code: [200]
    url: "{{ cloudflare_api_base }}/accounts/{{ cloudflare_account_id }}/access/apps"

- name: Apply Access policy for each entry
  loop: "{{ cloudflare_access_policies }}"
  loop_control:
    loop_var: cloudflare_access_policy
    label: "{{ cloudflare_access_policy.name | default(cloudflare_access_policy.hostname) }}"
  ansible.builtin.include_tasks: configure_access_policy.yml
