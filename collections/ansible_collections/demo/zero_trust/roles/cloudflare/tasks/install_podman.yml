---
- name: Assert tunnel token is available
  no_log: "{{ cloudflare_no_log | default(true) }}"
  ansible.builtin.assert:
    fail_msg: >-
      cloudflare_tunnel_token is required. Run create_tunnel first in the same play,
      or set cloudflare_tunnel_token explicitly.
    that:
      - cloudflare_tunnel_token is defined
      - cloudflare_tunnel_token | length > 0

- name: Install podman
  become: true
  ansible.builtin.package:
    name: podman
    state: present

- name: Pull cloudflared container image
  become: true
  containers.podman.podman_image:
    name: "{{ cloudflare_container_image }}"
    state: present

- name: Store tunnel token as Podman secret
  become: true
  no_log: "{{ cloudflare_no_log | default(true) }}"
  containers.podman.podman_secret:
    name: "{{ cloudflare_podman_secret_name }}"
    state: present
    data: "{{ cloudflare_tunnel_token }}"
    force: true

- name: Ensure Quadlet unit directory exists
  become: true
  ansible.builtin.file:
    state: directory
    mode: "0755"
    path: /etc/containers/systemd

- name: Install cloudflared Quadlet unit
  become: true
  register: cloudflare_quadlet
  ansible.builtin.template:
    dest: "/etc/containers/systemd/{{ cloudflare_container_name }}.container"
    mode: "0644"
    src: cloudflared.container.j2

- name: Reload systemd to pick up Quadlet unit
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start cloudflared Quadlet service
  become: true
  ansible.builtin.systemd:
    name: "{{ cloudflare_container_name }}.service"
    state: "{{ 'restarted' if cloudflare_quadlet.changed else 'started' }}"
    enabled: true
