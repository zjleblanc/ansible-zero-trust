---
- name: Install podman
  become: true
  ansible.builtin.dnf:
    name: podman
    state: present

- name: Validate registry credentials are complete
  when: >-
    (vault_registry_username is defined) or
    (vault_registry_password is defined)
  ansible.builtin.assert:
    that:
      - vault_registry_username is defined
      - vault_registry_username | length > 0
      - vault_registry_password is defined
      - vault_registry_password | length > 0
    fail_msg: >-
      Provide both vault_registry_username and vault_registry_password
      (and optionally vault_registry) to authenticate image pulls.

- name: Log in to container registry
  become: true
  when:
    - vault_registry_username is defined
    - vault_registry_username | length > 0
    - vault_registry_password is defined
    - vault_registry_password | length > 0
  vars:
    _vault_registry: >-
      {{ vault_registry | default(
           vault_container_image.split('/')[0]
           if (vault_container_image is match('^[^/]+\.[^/]+/'))
           else 'docker.io',
           true
         ) }}
  no_log: "{{ vault_no_log | default(true) }}"
  containers.podman.podman_login:
    registry: "{{ _vault_registry }}"
    username: "{{ vault_registry_username }}"
    password: "{{ vault_registry_password }}"

- name: Pull Vault container image
  become: true
  containers.podman.podman_image:
    name: "{{ vault_container_image }}"
    state: present

- name: Create vault host directories
  become: true
  loop:
    - "{{ vault_storage_path }}"
    - "{{ vault_config_path }}"
    - "{{ vault_tls_cert_dest | dirname }}"
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ vault_container_uid }}"
    group: "{{ vault_container_gid }}"
    mode: "0755"
    state: directory

- name: Stat TLS files
  become: true
  when: vault_tls_enabled | bool
  register: vault_podman_tls_files
  loop:
    - "{{ vault_tls_cert_dest }}"
    - "{{ vault_tls_key_dest }}"
  ansible.builtin.stat:
    path: "{{ item }}"

- name: Set TLS file ownership for container
  become: true
  when: item.stat.exists | default(false)
  loop: "{{ vault_podman_tls_files.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default(item) }}"
  ansible.builtin.file:
    path: "{{ item.item }}"
    owner: "{{ vault_container_uid }}"
    group: "{{ vault_container_gid }}"

- name: Template vault config for container
  become: true
  vars:
    vault_config_storage_path: "{{ vault_container_storage_path }}"
    vault_config_tls_cert: "{{ vault_container_tls_dir }}/{{ vault_tls_cert_dest | basename }}"
    vault_config_tls_key: "{{ vault_container_tls_dir }}/{{ vault_tls_key_dest | basename }}"
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ vault_config_path }}/vault.hcl"
    owner: "{{ vault_container_uid }}"
    group: "{{ vault_container_gid }}"
    mode: "0640"

- name: Ensure Quadlet unit directory exists
  become: true
  ansible.builtin.file:
    path: /etc/containers/systemd
    mode: "0755"
    state: directory

- name: Remove legacy podman generate-systemd unit if present
  become: true
  ansible.builtin.file:
    path: "/etc/systemd/system/container-{{ vault_container_name }}.service"
    state: absent

- name: Install Vault Quadlet unit
  become: true
  ansible.builtin.template:
    src: vault.container.j2
    dest: "/etc/containers/systemd/{{ vault_container_name }}.container"
    mode: "0644"
  register: vault_quadlet

- name: Reload systemd to pick up Quadlet unit
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start Vault Quadlet service on boot
  become: true
  ansible.builtin.systemd:
    name: "{{ vault_container_name }}.service"
    enabled: true
    state: "{{ 'restarted' if vault_quadlet.changed else 'started' }}"

- name: Set vault CLI facts for podman deployment
  ansible.builtin.set_fact:
    vault_cli_addr: "{{ vault_tls_enabled | ternary('https', 'http') }}://127.0.0.1:{{ vault_port }}"
    # -e VAULT_TOKEN (no value) forwards the host process env into the container so
    # Ansible environment: VAULT_TOKEN=... reaches vault CLI inside podman exec.
    vault_cli: >-
      podman exec
      -e VAULT_ADDR={{ vault_tls_enabled | ternary('https', 'http') }}://127.0.0.1:{{ vault_port }}
      -e VAULT_SKIP_VERIFY=1
      -e VAULT_TOKEN
      {{ vault_container_name }} vault
