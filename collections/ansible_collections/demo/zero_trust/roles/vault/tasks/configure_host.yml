---
- name: Ensure TLS destination directory exists
  become: true
  when:
    - vault_tls_enabled | bool
    - vault_tls_cert_src is defined
    - vault_tls_key_src is defined
  ansible.builtin.file:
    path: "{{ vault_tls_cert_dest | dirname }}"
    mode: "0755"
    state: directory

- name: Copy TLS certificate to host
  become: true
  when:
    - vault_tls_enabled | bool
    - vault_tls_cert_src is defined
    - vault_tls_key_src is defined
  ansible.builtin.copy:
    src: "{{ vault_tls_cert_src }}"
    dest: "{{ vault_tls_cert_dest }}"
    mode: "0644"

- name: Copy TLS private key to host
  become: true
  when:
    - vault_tls_enabled | bool
    - vault_tls_cert_src is defined
    - vault_tls_key_src is defined
  ansible.builtin.copy:
    src: "{{ vault_tls_key_src }}"
    dest: "{{ vault_tls_key_dest }}"
    mode: "0600"

- name: Setup firewall rule
  become: true
  ansible.posix.firewalld:
    port: "{{ vault_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
