---
# Configure Vault userpass auth from a JSON users config.
# Requires vault_cli / vault_cli_addr (set by install_rpm or install_podman).
# vault_token may be provided by the caller, set by init_vault, or loaded from
# {{ vault_storage_path }}/init_data.json (root_token).
#
# Vault write/policy payloads are passed on stdin (vault CLI "-") so Podman
# installs do not need the container user to read host-written @files under
# the data volume (root-owned 0600 caused permission denied).
# Podman vault_cli includes -e VAULT_TOKEN so Ansible environment: reaches the container.

- name: Load vault init data for root token
  when: vault_token is not defined or (vault_token | default('') | length) == 0
  become: true
  no_log: "{{ vault_no_log | default(true) }}"
  register: _vault_userpass_token_slurp
  failed_when: false
  ansible.builtin.slurp:
    src: "{{ vault_storage_path }}/init_data.json"

- name: Set vault_token from init data
  when:
    - vault_token is not defined or (vault_token | default('') | length) == 0
    - _vault_userpass_token_slurp.content is defined
  no_log: "{{ vault_no_log | default(true) }}"
  ansible.builtin.set_fact:
    vault_token: "{{ (_vault_userpass_token_slurp.content | b64decode | from_json).root_token }}"

- name: Require vault_token
  ansible.builtin.assert:
    fail_msg: >-
      vault_token is required. Provide it explicitly, run init_vault in the same
      play first, or ensure {{ vault_storage_path }}/init_data.json exists with
      a root_token field.
    that:
      - vault_token is defined
      - vault_token | length > 0

- name: Resolve Vault CLI for stdin writes
  ansible.builtin.set_fact:
    _vault_cli_stdin_argv: "{{ (vault_cli.split()[:2] + ['-i'] + vault_cli.split()[2:]) if (vault_cli is match('^podman\\s+exec\\b')) else vault_cli.split() }}"

- name: Load vault users config
  ansible.builtin.set_fact:
    _vault_users_config: "{{ lookup('ansible.builtin.file', role_path ~ '/files/' ~ vault_userpass_users_file) | from_json }}"

- name: Require users list in config
  ansible.builtin.assert:
    fail_msg: >-
      {{ vault_userpass_users_file }} must contain a non-empty "users" list.
    that:
      - _vault_users_config.users is defined
      - _vault_users_config.users | length > 0

- name: Validate user entries
  loop: "{{ _vault_users_config.users }}"
  loop_control:
    label: "{{ item.username | default('unknown') }}"
  ansible.builtin.assert:
    fail_msg: >-
      Each user requires username and role (admin|user). Invalid entry: {{ item }}
    that:
      - item.username is defined
      - item.username | length > 0
      - item.role is defined
      - item.role in ['admin', 'user']

- name: List Vault auth methods
  become: true
  register: vault_auth_list_result
  changed_when: false
  failed_when: vault_auth_list_result.rc != 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ vault_cli.split() + ['auth', 'list', '-format', 'json'] }}"

- name: Enable userpass auth method
  when: "'userpass/' not in (vault_auth_list_result.stdout | from_json)"
  become: true
  register: vault_userpass_enable_result
  changed_when: vault_userpass_enable_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ vault_cli.split() + ['auth', 'enable', 'userpass'] }}"

- name: Write admin Vault policy
  become: true
  register: vault_admin_policy_result
  changed_when: vault_admin_policy_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ _vault_cli_stdin_argv + ['policy', 'write', vault_userpass_admin_policy_name, '-'] }}"
    stdin: "{{ lookup('ansible.builtin.template', 'vault_admin_policy.hcl.j2') }}"

- name: Write user Vault policy
  become: true
  register: vault_user_policy_result
  changed_when: vault_user_policy_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ _vault_cli_stdin_argv + ['policy', 'write', vault_userpass_user_policy_name, '-'] }}"
    stdin: "{{ lookup('ansible.builtin.template', 'vault_user_policy.hcl.j2') }}"

- name: Resolve userpass passwords
  loop: "{{ _vault_users_config.users }}"
  loop_control:
    label: "{{ item.username }}"
  no_log: "{{ vault_no_log | default(true) }}"
  ansible.builtin.set_fact:
    _vault_userpass_resolved_users: >-
      {{
        _vault_userpass_resolved_users | default([]) + [
          {
            'username': item.username,
            'role': item.role,
            'password': (
              item.password
              if (item.password is defined and (item.password | length) > 0)
              else lookup(
                'ansible.builtin.password',
                '/dev/null',
                length=vault_userpass_password_length,
                chars=vault_userpass_password_chars
              )
            ),
            'password_generated': (
              item.password is not defined or (item.password | default('') | length) == 0
            ),
            'policies': (
              [vault_userpass_admin_policy_name]
              if item.role == 'admin'
              else [vault_userpass_user_policy_name]
            )
          }
        ]
      }}

- name: Create userpass users
  loop: "{{ _vault_userpass_resolved_users }}"
  loop_control:
    label: "{{ item.username }}"
  become: true
  register: vault_userpass_user_result
  changed_when: vault_userpass_user_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ _vault_cli_stdin_argv + ['write', 'auth/userpass/users/' + item.username, '-'] }}"
    stdin: "{{ {'password': item.password, 'policies': item.policies | join(',')} | to_json }}"

- name: Collect auto-generated userpass credentials
  when: item.password_generated | bool
  loop: "{{ _vault_userpass_resolved_users }}"
  loop_control:
    label: "{{ item.username }}"
  no_log: "{{ vault_no_log | default(true) }}"
  ansible.builtin.set_fact:
    _vault_userpass_generated_users: >-
      {{
        _vault_userpass_generated_users | default([]) + [
          {
            'username': item.username,
            'role': item.role,
            'password': item.password
          }
        ]
      }}

- name: Save generated userpass credentials
  when: (_vault_userpass_generated_users | default([]) | length) > 0
  become: true
  no_log: "{{ vault_no_log | default(true) }}"
  ansible.builtin.copy:
    content: "{{ {'users': _vault_userpass_generated_users} | to_nice_json(indent=2) }}\n"
    dest: "{{ vault_storage_path }}/{{ vault_userpass_credentials_file }}"
    mode: "0600"
