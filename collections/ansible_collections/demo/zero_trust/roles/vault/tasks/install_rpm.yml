---
- name: Install yum-utils
  become: true
  ansible.builtin.dnf:
    name: yum-utils

- name: Add Hashicorp repository
  become: true
  ansible.builtin.yum_repository:
    name: Hashicorp
    description: Hashicorp Stable - $basearch
    baseurl: https://rpm.releases.hashicorp.com/RHEL/$releasever/$basearch/stable
    enabled: true
    gpgcheck: true
    gpgkey: https://rpm.releases.hashicorp.com/gpg

- name: Install vault
  become: true
  ansible.builtin.dnf:
    name: vault

- name: Create storage directory
  become: true
  ansible.builtin.file:
    state: directory
    group: vault
    mode: "0755"
    owner: vault
    path: "{{ vault_storage_path }}"

- name: Ensure TLS directory ownership
  when: vault_tls_enabled | bool
  become: true
  ansible.builtin.file:
    state: directory
    group: vault
    mode: "0755"
    owner: vault
    path: "{{ vault_tls_cert_dest | dirname }}"

- name: Stat TLS files
  when: vault_tls_enabled | bool
  loop:
    - "{{ vault_tls_cert_dest }}"
    - "{{ vault_tls_key_dest }}"
  loop_control:
    label: "{{ item }}"
  become: true
  register: vault_rpm_tls_files
  ansible.builtin.stat:
    path: "{{ item }}"

- name: Set TLS file ownership
  when: item.stat.exists | default(false)
  loop: "{{ vault_rpm_tls_files.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default(item) }}"
  become: true
  ansible.builtin.file:
    group: vault
    owner: vault
    path: "{{ item.item }}"

- name: Template vault config
  become: true
  ansible.builtin.template:
    dest: /etc/vault.d/vault.hcl
    group: vault
    mode: "0640"
    owner: vault
    src: vault.hcl.j2

- name: Start vault service
  become: true
  ansible.builtin.service:
    name: vault
    state: restarted
    enabled: true

- name: Set vault CLI facts for RPM deployment
  ansible.builtin.set_fact:
    vault_cli: vault
    vault_cli_addr: "{{ vault_addr }}"
