---
# Configure Vault JWT auth for AAP OIDC workload identity.
# Requires vault_cli / vault_cli_addr (set by install_rpm or install_podman).
# vault_token may be provided by the caller, set by init_vault, or loaded from
# {{ vault_storage_path }}/init_data.json (root_token).
#
# Vault write/policy payloads are passed on stdin (vault CLI "-") so Podman
# installs do not need the container user to read host-written @files under
# the data volume (root-owned 0600 caused permission denied).

- name: Load vault init data for root token
  become: true
  when: vault_token is not defined or (vault_token | default('') | length) == 0
  no_log: "{{ vault_no_log | default(true) }}"
  ansible.builtin.slurp:
    src: "{{ vault_storage_path }}/init_data.json"
  register: _vault_jwt_token_slurp
  failed_when: false

- name: Set vault_token from init data
  when:
    - vault_token is not defined or (vault_token | default('') | length) == 0
    - _vault_jwt_token_slurp.content is defined
  no_log: "{{ vault_no_log | default(true) }}"
  ansible.builtin.set_fact:
    vault_token: "{{ (_vault_jwt_token_slurp.content | b64decode | from_json).root_token }}"

- name: Require vault_token
  ansible.builtin.assert:
    that:
      - vault_token is defined
      - vault_token | length > 0
    fail_msg: >-
      vault_token is required. Provide it explicitly, run init_vault in the same
      play first, or ensure {{ vault_storage_path }}/init_data.json exists with
      a root_token field.

- name: Resolve Vault CLI for stdin writes
  ansible.builtin.set_fact:
    _vault_cli_stdin_argv: "{{ (vault_cli.split()[:2] + ['-i'] + vault_cli.split()[2:]) if (vault_cli is match('^podman\\s+exec\\b')) else vault_cli.split() }}"

- name: List Vault auth methods
  become: true
  register: vault_auth_list_result
  changed_when: false
  failed_when: vault_auth_list_result.rc != 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ vault_cli.split() + ['auth', 'list', '-format', 'json'] }}"

- name: Enable JWT auth method
  become: true
  when: "'jwt/' not in (vault_auth_list_result.stdout | from_json)"
  register: vault_jwt_enable_result
  changed_when: vault_jwt_enable_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ vault_cli.split() + ['auth', 'enable', 'jwt'] }}"

- name: Build JWT auth backend config payload
  no_log: "{{ vault_no_log | default(true) }}"
  vars:
    _vault_jwt_auth_config_base:
      oidc_discovery_url: "{{ vault_jwt_oidc_discovery_url }}"
  ansible.builtin.set_fact:
    _vault_jwt_auth_config: >-
      {{ _vault_jwt_auth_config_base | combine(
           {'oidc_discovery_ca_pem': lookup('ansible.builtin.file', vault_jwt_oidc_discovery_ca_pem)}
           if (vault_jwt_oidc_discovery_ca_pem | default('') | length > 0)
           else {}
         ) }}

- name: Configure JWT auth backend
  become: true
  register: vault_jwt_config_result
  changed_when: vault_jwt_config_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ _vault_cli_stdin_argv + ['write', 'auth/jwt/config', '-'] }}"
    stdin: "{{ _vault_jwt_auth_config | to_json }}"

- name: Write static Vault policy
  become: true
  register: vault_static_policy_result
  changed_when: vault_static_policy_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ _vault_cli_stdin_argv + ['policy', 'write', vault_jwt_static_policy_name, '-'] }}"
    stdin: "{{ lookup('ansible.builtin.template', 'vault_static_policy.hcl.j2') }}"

- name: Build static JWT role payload
  ansible.builtin.set_fact:
    _vault_jwt_static_role:
      role_type: jwt
      bound_audiences: "{{ vault_jwt_bound_audiences }}"
      user_claim: sub
      bound_claims: "{{ vault_jwt_static_bound_claims }}"
      policies:
        - "{{ vault_jwt_static_policy_name }}"

- name: Create static JWT role
  become: true
  register: vault_static_role_result
  changed_when: vault_static_role_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ _vault_cli_stdin_argv + ['write', 'auth/jwt/role/' + vault_jwt_static_role_name, '-'] }}"
    stdin: "{{ _vault_jwt_static_role | to_json }}"

- name: Refresh Vault auth methods for JWT accessor
  become: true
  register: vault_auth_list_for_accessor
  changed_when: false
  failed_when: vault_auth_list_for_accessor.rc != 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ vault_cli.split() + ['auth', 'list', '-format', 'json'] }}"

- name: Set JWT auth method accessor
  ansible.builtin.set_fact:
    vault_jwt_accessor: "{{ (vault_auth_list_for_accessor.stdout | from_json)['jwt/'].accessor }}"

- name: Write dynamic Vault policy
  become: true
  register: vault_dynamic_policy_result
  changed_when: vault_dynamic_policy_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ _vault_cli_stdin_argv + ['policy', 'write', vault_jwt_dynamic_policy_name, '-'] }}"
    stdin: "{{ lookup('ansible.builtin.template', 'vault_templated_policy.hcl.j2') }}"

- name: Build dynamic JWT role payload
  ansible.builtin.set_fact:
    _vault_jwt_dynamic_role:
      role_type: jwt
      bound_audiences: "{{ vault_jwt_bound_audiences }}"
      user_claim: sub
      bound_claims: "{{ vault_jwt_dynamic_bound_claims }}"
      claim_mappings: "{{ vault_jwt_dynamic_claim_mappings }}"
      policies:
        - "{{ vault_jwt_dynamic_policy_name }}"

- name: Create dynamic JWT role
  become: true
  register: vault_dynamic_role_result
  changed_when: vault_dynamic_role_result.rc == 0
  no_log: "{{ vault_no_log | default(true) }}"
  environment:
    VAULT_ADDR: "{{ vault_cli_addr }}"
    VAULT_TOKEN: "{{ vault_token }}"
  ansible.builtin.command:
    argv: "{{ _vault_cli_stdin_argv + ['write', 'auth/jwt/role/' + vault_jwt_dynamic_role_name, '-'] }}"
    stdin: "{{ _vault_jwt_dynamic_role | to_json }}"
