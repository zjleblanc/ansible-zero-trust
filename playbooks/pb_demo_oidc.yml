---
# Demo AAP OIDC → Vault JWT workload identity.
#
# Run this from an AAP job template that has a HashiCorp Vault Secret Lookup
# (OIDC) credential attached (or a custom credential whose injector maps the
# looked-up value to the generic_token extra var). At job start AAP:
#   1. Issues a short-lived JWT for this job (AAP as OIDC IdP)
#   2. Authenticates to Vault with that JWT (jwt auth from configure_jwt_auth)
#   3. Fetches the configured KV secret and injects it as generic_token
#
# Printing generic_token shows the OIDC path worked — no static Vault token
# needed in AAP.
- name: Demo AAP OIDC Vault integration
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  tasks:
    - name: Require generic_token from AAP OIDC credential injection
      ansible.builtin.assert:
        that:
          - generic_token is defined
          - (generic_token | string | length) > 0
        fail_msg: >-
          generic_token is not set. Attach a HashiCorp Vault Secret Lookup
          (OIDC) credential (or a custom credential that injects
          generic_token) to the job template and re-run. AAP authenticates
          to Vault with a job-scoped JWT and injects the looked-up secret
          as this variable.
        success_msg: generic_token was injected via AAP Vault OIDC auth

    - name: Print generic_token (OIDC secret lookup succeeded)
      ansible.builtin.debug:
        var: generic_token
